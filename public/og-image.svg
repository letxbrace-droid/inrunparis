<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000e1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#001f33;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4103;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e83800;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Orange glow orb (top right) -->
  <circle cx="1100" cy="80" r="200" fill="rgba(255,65,3,0.08)"/>
  <circle cx="1100" cy="80" r="100" fill="rgba(255,65,3,0.06)"/>

  <!-- Road lines (decorative bottom right) -->
  <path d="M 800 630 L 1050 380 L 1200 340" stroke="rgba(255,65,3,0.15)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 820 630 L 1070 400 L 1200 365" stroke="rgba(255,65,3,0.08)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="20,12"/>

  <!-- App icon circle background -->
  <circle cx="160" cy="315" r="110" fill="url(#accent)" filter="url(#glow)"/>

  <!-- R road logo inside circle -->
  <!-- Vertical bar of R -->
  <rect x="118" y="258" width="22" height="115" rx="4" fill="white"/>
  <!-- Top curve of R -->
  <path d="M 140 258 Q 195 258 195 295 Q 195 330 140 335" stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Leg of R -->
  <line x1="140" y1="335" x2="198" y2="373" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Road lines under R -->
  <line x1="122" y1="385" x2="190" y2="385" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <line x1="130" y1="393" x2="182" y2="393" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- I&N text (small above logo) -->
  <text x="160" y="244" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle" letter-spacing="4">I&amp;N</text>

  <!-- Main title -->
  <text x="320" y="275" font-family="Helvetica Neue, Arial, sans-serif" font-size="92" font-weight="900" fill="white" letter-spacing="-2">I&amp;N RUN</text>

  <!-- Accent underline -->
  <rect x="320" y="295" width="480" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="320" y="360" font-family="Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="400" fill="rgba(245,241,232,0.75)" letter-spacing="0.5">Chauffeur privé VTC · Paris</text>

  <!-- Tags row -->
  <!-- Tag 1: Tarif fixe -->
  <rect x="320" y="405" width="170" height="44" rx="22" fill="rgba(255,65,3,0.15)" stroke="rgba(255,65,3,0.4)" stroke-width="1.5"/>
  <text x="405" y="433" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="600" fill="#ff4103" text-anchor="middle">Tarif fixe</text>

  <!-- Tag 2: 24h/7j -->
  <rect x="504" y="405" width="130" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="569" y="433" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(245,241,232,0.7)" text-anchor="middle">24h / 7j</text>

  <!-- Tag 3: Paris · CDG · Orly -->
  <rect x="648" y="405" width="260" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="778" y="433" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="600" fill="rgba(245,241,232,0.7)" text-anchor="middle">Paris · CDG · Orly</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,65,3,0.08)"/>
  <text x="320" y="612" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="500" fill="rgba(245,241,232,0.45)" letter-spacing="0.5">Réservation WhatsApp · Confirmation 2 min · Île-de-France</text>
  <rect x="0" y="580" width="1200" height="1" fill="rgba(255,65,3,0.2)"/>
</svg>
