<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>I&N RUN — Hors ligne</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: -apple-system, system-ui, sans-serif;
    background: #000; color: #F5F1E8;
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 0; text-align: center; padding: 32px 24px; max-width: 320px; }
  .logo { width: 80px; height: 80px; border-radius: 18px; animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.85} 50%{opacity:1} }
  .wifi { margin-top: 24px; color: rgba(245,241,232,.28); }
  h1 { margin-top: 16px; font-size: 20px; font-weight: 800; letter-spacing: -.03em; }
  p  { margin-top: 8px; font-size: 14px; color: rgba(245,241,232,.55); line-height: 1.5; }
  a  {
    margin-top: 28px; display: inline-flex; align-items: center; gap: 8px;
    background: #25D366; color: #fff; font-weight: 700; font-size: 14px;
    text-decoration: none; padding: 14px 22px; border-radius: 16px;
  }
  .retry {
    margin-top: 12px; font-size: 13px; color: rgba(245,241,232,.40); cursor: pointer;
    background: none; border: none; color: rgba(245,241,232,.40);
  }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="/inrunparis/icons/icon-192.png" alt="I&N RUN">
  <svg class="wifi" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <circle cx="12" cy="20" r="1" fill="currentColor"/>
  </svg>
  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion réseau pour utiliser l'application de réservation.</p>
  <a href="tel:+33767742220">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.47 11.47 0 0 0 3.59.57A1 1 0 0 1 21 16.5v3.5A1 1 0 0 1 20 21 17 17 0 0 1 3 4a1 1 0 0 1 1-.97h3.5a1 1 0 0 1 1 .92 11.47 11.47 0 0 0 .57 3.59 1 1 0 0 1-.25 1.02L6.62 10.79z"/>
    </svg>
    +33 7 67 74 22 20
  </a>
  <button class="retry" onclick="location.reload()">Réessayer ↺</button>
</div>
</body>
</html>
