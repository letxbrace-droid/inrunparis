<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>I&N RUN — Executive Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Marcellus&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #040811;
            --glass-card: rgba(21, 27, 43, 0.7);
            --gold: #FEB122;
            --gold-glow: rgba(254, 177, 34, 0.15);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-dim: #8e9aaf;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: calc(100px + var(--safe-bottom));
        }

        /* Effet de profondeur 3D Background */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(27, 84, 255, 0.1), transparent 70%);
            z-index: -1;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 20px) 24px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Marcellus', serif; color: var(--gold); letter-spacing: 4px; font-size: 1.3rem; }

        .container { padding: 0 20px; }

        /* Structure en Blocs 3D */
        .block-3d {
            background: var(--glass-card);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .block-3d:active { transform: scale(0.97); }

        .label-tech {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; color: var(--gold);
            text-transform: uppercase; letter-spacing: 3px;
            margin-bottom: 20px; display: block;
        }

        /* Toggles & Controls */
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .row:last-child { margin-bottom: 0; }

        /* iOS Toggle Switch */
        .switch {
            width: 50px; height: 28px; position: relative;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.1); border-radius: 30px; transition: 0.3s;
        }
        .slider:before {
            content: ""; position: absolute; height: 22px; width: 22px;
            left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
        }
        input:checked + .slider { background: var(--gold); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Navigation Tab Bar iOS */
        .tab-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px;
            background: rgba(10, 15, 28, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid var(--border-light);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .tab-item { color: var(--text-dim); text-align: center; font-size: 10px; }
        .tab-item.active { color: var(--gold); }

        .icon-svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; margin-bottom: 4px; }

        /* Button Tech Confirm */
        .btn-confirm {
            background: linear-gradient(135deg, var(--gold), #FFD76B);
            color: #000; font-weight: 800; border: none;
            width: 100%; padding: 20px; border-radius: 20px;
            font-family: 'Inter', sans-serif; letter-spacing: 1px;
            box-shadow: 0 10px 25px var(--gold-glow);
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">I&N RUN</div>
        <div style="font-family:'JetBrains Mono'; font-size:9px; border:1px solid #34d399; color:#34d399; padding:4px 10px; border-radius:10px;">SYSTEM ACTIVE</div>
    </header>

    <div class="container">
        <section class="block-3d">
            <span class="label-tech">Cabin Preferences</span>
            <div class="row">
                <div style="display:flex; align-items:center; gap:15px;">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                    <span>Wi-Fi 5G Gold</span>
                </div>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
            <div class="row">
                <div style="display:flex; align-items:center; gap:15px;">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2l4.5 9h-9L12 2z"/><path d="M12 11.5V22"/></svg>
                    <span>Eau de Source</span>
                </div>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
        </section>

        <section class="block-3d">
            <span class="label-tech">Climate Control</span>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:24px; font-weight:300;">21.5°C</span>
                <div style="display:flex; gap:10px;">
                    <div style="width:40px; height:40px; border-radius:50%; border:1px solid var(--border-light); display:flex; align-items:center; justify-content:center;">-</div>
                    <div style="width:40px; height:40px; border-radius:50%; border:1px solid var(--gold); color:var(--gold); display:flex; align-items:center; justify-content:center;">+</div>
                </div>
            </div>
        </section>

        <button class="btn-confirm" onclick="sendOrder()">CONFIRMER LE RÉGLAGE</button>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active">
            <svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <div>Home</div>
        </div>
        <div class="tab-item">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div>Chat</div>
        </div>
        <div class="tab-item">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <div>Profil</div>
        </div>
    </nav>

    <script>
        function sendOrder() {
            const btn = document.querySelector('.btn-confirm');
            btn.innerHTML = "ENVOI EN COURS...";
            btn.style.opacity = "0.7";
            setTimeout(() => {
                window.location.href = "https://wa.me/33600000000?text=Je%20confirme%20mes%20réglages%20cabine";
            }, 500);
        }
    </script>
</body>
</html>
