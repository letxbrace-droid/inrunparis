    <meta property="og:title" content="I&N RUN — L'Excellence du VTC à Paris">
    <meta property="og:description" content="Transport de prestige avec chauffeur privé. Tarifs fixes et transparence totale.">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TaxiService",
      "name": "I&N RUN",
      "description": "Service de chauffeur privé VTC Premium à Paris et Île-de-France.",
      "url": "https://letxbrace-droid.github.io/inrunparis/",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Paris",
        "addressCountry": "FR"
      },
      "areaServed": ["Paris", "CDG", "Orly", "Disneyland"],
      "priceRange": "$$"
    }
    </script>

    <style>
        :root {
            --bg-pure: #000000;
            --bg-elevated: #0a0a0b;
            --gold: #d4af37;
            --gold-soft: #f3e5a8;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.1);
            --spring-easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background-color: var(--bg-pure);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Layout Architecture */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
        }

        /* Header Premium */
        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold), var(--gold-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        .hero {
            padding: 40px 0;
            text-align: center;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            max-width: 80%;
            margin: 0 auto 30px;
        }

        /* Booking Card (Glassmorphism 2.0) */
        .booking-card {
            background: var(--glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .f-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s var(--spring-easing);
        }

        .f-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Autocomplete results */
        .ac-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-radius: 12px;
            margin-top: 5px;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .ac-item {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }

        /* Main Button CTA */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        /* WhatsApp Floating */
        .wa-sticky {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 448px;
            z-index: 90;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.6s var(--spring-easing) forwards;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">I&N RUN</div>
        <div id="status-badge" style="color: #30d158; font-size: 0.8rem; font-weight: 600;">
            ● DISPONIBLE
        </div>
    </header>

    <main>
        <section class="hero animate-in">
            <h1>L'excellence du <span style="color: var(--gold)">VTC</span></h1>
            <p class="subtitle">Berline de luxe & Chauffeurs certifiés. Voyagez en première classe dans tout Paris.</p>
        </section>

        <section class="booking-card animate-in" style="animation-delay: 0.1s;">
            <form id="reservation-form">
                <div class="input-group">
                    <label for="pickup">Lieu de départ</label>
                    <input type="text" id="pickup" class="f-input" placeholder="Adresse, Gare ou Aéroport..." required>
                    <div id="pickup-results" class="ac-results"></div>
                </div>

                <div class="input-group">
                    <label for="dropoff">Lieu d'arrivée</label>
                    <input type="text" id="dropoff" class="f-input" placeholder="Où allez-vous ?" required>
                    <div id="dropoff-results" class="ac-results"></div>
                </div>

                <div class="input-group">
                    <label for="datetime">Date & Heure</label>
                    <input type="datetime-local" id="datetime" class="f-input" required>
                </div>

                <div class="input-group">
                    <label for="phone">Numéro de Téléphone</label>
                    <input type="tel" id="phone" class="f-input" placeholder="06 12 34 56 78" required>
                </div>

                <button type="submit" class="btn-primary">VÉRIFIER LE PRIX & RÉSERVER</button>
            </form>
        </section>

        <section class="animate-in" style="animation-delay: 0.2s; padding-bottom: 100px;">
            <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 16px; font-size: 0.9rem; color: var(--text-dim); text-align: center;">
                "Service impeccable, ponctualité parfaite vers CDG." <br>
                <strong>— Marc A. (Avis Google 5/5)</strong>
            </div>
        </section>
    </main>
</div>

<script>
/**
 * ARCHITECTURE JAVASCRIPT I&N RUN v2.0
 * Encapsulation & Robustesse
 */
const InRunApp = (() => {
    
    // Configuration
    const CONFIG = {
        whatsappNumber: "336XXXXXXXX", // Remplace par ton numéro
        phoneRegex: /^(?:(?:\+|00)33|0)\s*[1-9](?:[\s.-]*\d{2}){4}$/
    };

    // Sélecteurs
    const form = document.getElementById('reservation-form');
    const inputs = {
        pickup: document.getElementById('pickup'),
        dropoff: document.getElementById('dropoff'),
        datetime: document.getElementById('datetime'),
        phone: document.getElementById('phone')
    };

    /**
     * Initialisation du formulaire
     */
    const init = () => {
        // Fixer la date minimum à "maintenant"
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        inputs.datetime.min = now.toISOString().slice(0, 16);

        form.addEventListener('submit', handleFormSubmit);
    };

    /**
     * Logique d'envoi WhatsApp
     */
    const handleFormSubmit = (e) => {
        e.preventDefault();

        // Validation simple du téléphone
        if (!CONFIG.phoneRegex.test(inputs.phone.value)) {
            alert("Veuillez entrer un numéro de téléphone valide.");
            return;
        }

        const message = encodeURIComponent(
            `Bonjour I&N RUN,\n\n` +
            `🚕 *DEMANDE DE RÉSERVATION*\n` +
            `---------------------------\n` +
            `📍 DEPART : ${inputs.pickup.value}\n` +
            `🏁 ARRIVÉE : ${inputs.dropoff.value}\n` +
            `📅 DATE/HEURE : ${inputs.datetime.value.replace('T', ' à ')}\n` +
            `📞 TEL : ${inputs.phone.value}\n` +
            `---------------------------\n` +
            `Merci de me confirmer le tarif.`
        );

        const waUrl = `https://wa.me/${CONFIG.whatsappNumber}?text=${message}`;
        
        // Feedback haptique (si supporté)
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        
        window.open(waUrl, '_blank');
    };

    return { init };
})();

// Lancement au chargement du DOM
document.addEventListener('DOMContentLoaded', InRunApp.init);
</script>

</body>
</html>
