<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#040811">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>I&N RUN — Premium Tech Interface</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&family=Marcellus&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink-deep: #040811;
            --ink-card: rgba(21, 27, 43, 0.7);
            --ink-border: rgba(254, 177, 34, 0.15);
            --gold-hot: #FEB122;
            --gold-glow: #FFD76B;
            --cyan-ice: #83F9FF;
            --paper: #ffffff;
            --paper-mute: #a4adbf;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--ink-deep);
            color: var(--paper);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 80% 0%, rgba(27, 84, 255, 0.12), transparent 50%),
                radial-gradient(circle at 20% 100%, rgba(254, 177, 34, 0.05), transparent 50%);
            z-index: -1;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: calc(var(--safe-top) + 15px) 24px 15px;
            background: rgba(4, 8, 17, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--ink-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Marcellus', serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--gold-hot);
            text-decoration: none;
        }

        /* SVG Icons Style */
        .icon-svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 211, 153, 0.1);
            padding: 4px 10px;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .hero { padding: 48px 24px 24px; text-align: left; }
        .kicker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.4em;
            color: var(--cyan-ice);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        h1 { font-family: 'Marcellus', serif; font-size: 2.4rem; font-weight: 400; }

        /* Grid UI */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 24px 24px;
        }

        .card {
            background: var(--ink-card);
            border: 1px solid var(--ink-border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:active { transform: scale(0.96); background: rgba(254, 177, 34, 0.05); }

        .card-icon-wrap {
            color: var(--gold-hot);
            opacity: 0.9;
        }

        .card-label { font-size: 12px; color: var(--paper-mute); font-weight: 500; }

        select {
            appearance: none;
            background: transparent;
            border: none;
            color: var(--gold-hot);
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            width: 100%;
            outline: none;
            cursor: pointer;
        }

        /* Settings List */
        .settings-group { padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
        
        .settings-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info { display: flex; align-items: center; gap: 16px; }
        .item-info span { font-size: 15px; font-weight: 400; }

        /* iOS Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--gold-hot); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* CTA */
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 20px 24px calc(var(--safe-bottom) + 20px);
            background: linear-gradient(to top, var(--ink-deep) 70%, transparent);
        }

        .btn-main {
            background: var(--paper);
            color: var(--ink-deep);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            height: 64px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s;
        }

        .btn-main:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">I&N RUN</a>
        <div class="status-pill">
            <svg class="icon-svg" style="width:10px; height:10px; stroke-width:3; stroke:#34d399;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            LIVE
        </div>
    </header>

    <main>
        <section class="hero">
            <span class="kicker">Smart Cabin Control</span>
            <h1>Confort</h1>
        </section>

        <div class="grid-options">
            <div class="card">
                <div class="card-icon-wrap">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                    </svg>
                </div>
                <div class="card-label">TEMPÉRATURE</div>
                <select id="temp">
                    <option>19.0°C</option>
                    <option>20.0°C</option>
                    <option selected>21.5°C</option>
                    <option>22.0°C</option>
                </select>
            </div>

            <div class="card">
                <div class="card-icon-wrap">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                    </svg>
                </div>
                <div class="card-label">AMBIANCE</div>
                <select id="mood">
                    <option>Deep Focus</option>
                    <option selected>Lounge Chill</option>
                    <option>Jazz Road</option>
                    <option>Silence</option>
                </select>
            </div>
        </div>

        <div class="settings-group">
            <div class="settings-item">
                <div class="item-info">
                    <div class="card-icon-wrap" style="color:var(--cyan-ice)">
                        <svg class="icon-svg" viewBox="0 0 24 24">
                            <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
                        </svg>
                    </div>
                    <span>Wi-Fi High-Speed</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="settings-item">
                <div class="item-info">
                    <div class="card-icon-wrap">
                        <svg class="icon-svg" viewBox="0 0 24 24">
                            <path d="M12 2l4.5 9h-9L12 2z"/><path d="M12 11.5V22"/><path d="M8 15h8"/>
                        </svg>
                    </div>
                    <span>Rafraîchissements</span>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div style="height: 140px;"></div>
    </main>

    <nav class="footer-nav">
        <a href="javascript:void(0)" class="btn-main" onclick="confirmRide()">
            <svg class="icon-svg" style="width:24px; height:24px; stroke: var(--ink-deep)" viewBox="0 0 24 24">
                <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
            APPLIQUER LES RÉGLAGES
        </a>
    </nav>

    <script>
        function confirmRide() {
            const temp = document.getElementById('temp').value;
            const mood = document.getElementById('mood').value;
            // Animation de feedback
            const btn = document.querySelector('.btn-main');
            btn.innerHTML = "RÉGLAGES ENVOYÉS...";
            btn.style.background = "#34d399";
            
            setTimeout(() => {
                const msg = encodeURIComponent(`Réglages Cabine :\n🌡 Temp: ${temp}\n🎵 Mode: ${mood}`);
                window.location.href = `https://wa.me/33600000000?text=${msg}`;
            }, 800);
        }
    </script>
</body>
</html>
