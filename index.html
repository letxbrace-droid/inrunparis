<body>
<!-- [HTML complet identique à la version précédente mais avec OSM autocomplete et préférences fonctionnelles] -->
<div id="ticker"><!-- Ticker --></div>
<header id="hdr"><!-- Header --></header>
<!-- Hero, tunnel, trafic sections identiques mais avec z-index fixes -->
<div id="weather-widget"><!-- Widget météo --></div>
<!-- ... reste du HTML ... -->
<script>
// Script complet avec OSM Nominatim autocomplete, préférences multiples, trafic Bison Futé + demo
var NOMINATIM = 'https://nominatim.openstreetmap.org/search?q=';
var Booking = {
  acCache: {},
  init: function() {
    flatpickr('#cal', {inline:true,locale:'fr',minDate:'today',onChange:s=>{this.date=s[0];document.getElementById('btn1').disabled=false}});
    flatpickr('#timepick', {enableTime:true,noCalendar:true,dateFormat:'H:i',time_24hr:true,locale:'fr',minuteIncrement:15});
    this.acInit('dep');
    this.acInit('arr');
  },
  acInit: function(field) {
    var inp = $(field), ac = $('ac-'+field);
    inp.addEventListener('input', debounce(function() {
      var q = this.value.trim();
      if(q.length < 2) return ac.classList.remove('open');
      if(Booking.acCache[q]) return Booking.acShow(ac, Booking.acCache[q]);
      fetch(NOMINATIM + encodeURIComponent(q) + '&format=json&countrycodes=fr&limit=6&addressdetails=1')
        .then(r=>r.json())
        .then(data => {
          Booking.acCache[q] = data;
          Booking.acShow(ac, data);
        }).catch(() => Booking.acShow(ac, Booking.acFallback(q)));
    }, 300));
  },
  acShow: function(ac, data) {
    ac.innerHTML = data.map(d => `
      <div class="ac-item" onclick="Booking.acPick('${d.display_name}', '${d.lat}', '${d.lon}')">
        <span class="ac-ic">📍</span>
        <div>
          <div class="ac-main">${d.display_name.split(',')[0]}</div>
          <div class="ac-sec">${d.display_name}</div>
        </div>
      </div>
    `).join('');
    ac.classList.add('open');
  },
  acFallback: function(q) {
    var fallbacks = [
      {name: 'Ris-Orangis', addr: '7 Av. du Parc, 91130 Ris-Orangis'},
      {name: 'CDG Terminal 2', addr: '95700 Roissy-en-France'},
