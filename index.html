<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080616">
<title>I&N RUN — Chauffeur Privé Paris | Tech Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&family=Marcellus&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #080616;
  --surface: rgba(255, 255, 255, 0.04);
  --accent-blue: #1e90ff;
  --accent-glow: rgba(30, 144, 255, 0.3);
  --accent-green: #00ff85;
  --text-high: #ffffff;
  --text-med: #b0b0b0;
  --glass-border: rgba(255, 255, 255, 0.1);
  --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
    font-family: 'Inter', sans-serif; 
    background: var(--bg-deep); 
    background: radial-gradient(circle at 50% -20%, #1a1953 0%, #080616 80%);
    color: var(--text-high); 
    overflow-x: hidden;
}

/* ── UI COMPONENTS ── */
.glass-panel {
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.tunnel { max-width: 500px; margin: 40px auto; padding: 0 20px; }

.card { padding: 30px; margin-bottom: 25px; transition: var(--transition); position: relative; overflow: hidden; }
.card.active { border-color: var(--accent-blue); box-shadow: 0 0 40px var(--accent-glow); }
.card.locked { opacity: 0.3; filter: grayscale(1) blur(2px); pointer-events: none; }

/* ── TECH SVG ICONS ── */
.icon-tech { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; vertical-align: middle; }
.icon-blue { color: var(--accent-blue); filter: drop-shadow(0 0 5px var(--accent-blue)); }

/* ── FORMS ── */
.f-lbl { display: block; font-size: 0.65rem; color: var(--text-med); text-transform: uppercase; letter-spacing: 2.5px; margin: 20px 0 10px 5px; }
.f-wrap {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    display: flex; align-items: center; padding: 0 18px;
    transition: var(--transition);
}
.f-wrap:focus-within { border-color: var(--accent-blue); background: rgba(30, 144, 255, 0.05); }
.f-in { background: transparent; border: none; outline: none; height: 56px; color: #fff; font-size: 1rem; width: 100%; font-weight: 300; }

/* ── STEP 2 : CONTRÔLES 3D INTUITIFS ── */
.media-selector {
    display: flex; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 50px;
    position: relative; border: 1px solid var(--glass-border); margin-bottom: 25px;
}
.media-opt {
    flex: 1; text-align: center; padding: 12px 0; font-size: 0.8rem; font-weight: 600;
    color: var(--text-med); cursor: pointer; z-index: 2; transition: var(--transition);
}
.media-opt.active { color: #fff; }
.selection-glow {
    position: absolute; left: 5px; top: 5px; height: calc(100% - 10px); width: calc(33.33% - 7px);
    background: var(--accent-blue); border-radius: 50px;
    box-shadow: 0 0 20px var(--accent-blue);
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* SLIDERS */
.slider-container { margin-bottom: 30px; }
.slider-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; font-weight: 500; }
input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 6px;
    background: rgba(255,255,255,0.1); border-radius: 10px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px;
    background: #fff; border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 15px var(--accent-blue); border: 5px solid var(--bg-deep);
}

/* ── WIDGETS LIVE ── */
.live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 20px auto; padding: 0 20px; }
.widget { padding: 20px; position: relative; overflow: hidden; }
.widget h5 { font-size: 0.65rem; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.widget-val { font-size: 1.6rem; font-family: 'Marcellus'; margin: 5px 0; }
.widget-sub { font-size: 0.75rem; color: var(--text-med); }

/* ── BUTTONS ── */
.btn-tech {
    width: 100%; height: 64px; border: none; border-radius: 20px;
    background: linear-gradient(135deg, var(--accent-blue), #0052d4);
    color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    cursor: pointer; transition: var(--transition);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}
.btn-tech:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--accent-glow); }

.loader { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STICKY ── */
.sticky-nav { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: rgba(8,6,22,0.85); backdrop-filter: blur(20px);
    padding: 15px 25px env(safe-area-inset-bottom, 15px);
    display: flex; gap: 15px; border-top: 1px solid var(--glass-border); z-index: 100;
}
.sn-item { 
    flex: 1; height: 50px; display: flex; align-items: center; justify-content: center; gap: 10px;
    border-radius: 16px; font-weight: 600; text-decoration: none; font-size: 0.85rem; transition: var(--transition);
}
.sn-msg { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
.sn-tel { background: rgba(30,144,255,0.15); color: var(--accent-blue); border: 1px solid rgba(30,144,255,0.3); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.overlay.show { display: flex; }
</style>
</head>
<body>

<header id="hdr" style="padding: 15px 25px; border-bottom: 1px solid var(--glass-border);">
    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto;">
        <div class="logo">
            <svg width="100" height="35" viewBox="0 0 110 40">
                <text x="55" y="20" font-family="Marcellus" font-size="22" fill="#fff" text-anchor="middle" letter-spacing="3">I&N</text>
                <line x1="20" y1="28" x2="90" y2="28" stroke="#1e90ff" stroke-width="1.5"/>
                <text x="55" y="38" font-family="Inter" font-size="8" fill="#1e90ff" text-anchor="middle" letter-spacing="5">TECH RUN</text>
            </svg>
        </div>
        <div style="color: var(--accent-green); font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 6px;">
            <span style="width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green);"></span>
            SYSTEM ONLINE
        </div>
    </div>
</header>

<div class="tunnel">
    <div class="glass-panel card active" id="step1">
        <h5>
            <svg class="icon-tech icon-blue" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            1. RÉSERVATION
        </h5>
        
        <label class="f-lbl">Point de départ</label>
        <div class="f-wrap">
            <input type="text" id="dep" class="f-in" placeholder="Ex: Aéroport CDG, Gare du Nord...">
        </div>
        
        <label class="f-lbl">Destination</label>
        <div class="f-wrap">
            <input type="text" id="arr" class="f-in" placeholder="Ex: Paris 8ème, Disneyland...">
        </div>

        <label class="f-lbl">Date & Heure</label>
        <div class="f-wrap">
            <input type="datetime-local" id="timepick" class="f-in" style="color-scheme: dark;">
        </div>

        <button class="btn-tech" style="margin-top: 30px;" onclick="nextStep(2)">VÉRIFIER LE CONFORT</button>
    </div>

    <div class="glass-panel card locked" id="step2">
        <h5>
            <svg class="icon-tech icon-blue" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0.73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0.73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            2. HABITACLE
        </h5>

        <div class="slider-container" style="margin-top: 25px;">
            <div class="slider-header">
                <span>Ambiance</span>
                <span id="amb-label" style="color: var(--accent-blue)">Musique</span>
            </div>
            <div class="media-selector">
                <div class="media-opt active" onclick="setAmb(0, 'Musique')">Musique</div>
                <div class="media-opt" onclick="setAmb(1, 'Radio')">Radio</div>
                <div class="media-opt" onclick="setAmb(2, 'Silence')">Silence</div>
                <div class="selection-glow" id="glow"></div>
            </div>
        </div>

        <div class="slider-container">
            <div class="slider-header">
                <span>Volume Audio</span>
                <span id="vol-val">65%</span>
            </div>
            <input type="range" min="0" max="100" value="65" oninput="updateUI('vol', this.value, '%')">
        </div>

        <div class="slider-container">
            <div class="slider-header">
                <span>Climatisation</span>
                <span id="clim-val">21°C</span>
            </div>
            <input type="range" min="16" max="28" value="21" oninput="updateUI('clim', this.value, '°C')" style="background: linear-gradient(90deg, #1e90ff, #ff4500);">
        </div>

        <button class="btn-tech" onclick="calculateFinal()">
            <span id="btn-text">CALCULER MON TARIF</span>
            <div class="loader" id="calc-loader"></div>
        </button>
    </div>
</div>

<div class="live-grid">
    <div class="glass-panel widget">
        <h5>
            <svg class="icon-tech" viewBox="0 0 24 24"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="M15.91 5.41 14.17 7.15"/><path d="m8.09 5.41 1.74 1.74"/><path d="M12 8v4"/><path d="m12 16.01.01"/><circle cx="12" cy="12" r="10"/></svg>
            MÉTÉO LIVE
        </h5>
        <div class="widget-val">12°C</div>
        <div class="widget-sub">Ciel dégagé</div>
    </div>
    <div class="glass-panel widget">
        <h5>
            <svg class="icon-tech" viewBox="0 0 24 24"><rect width="20" height="12" x="2" y="9" rx="2"/><path d="M5 9V7a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v2"/><path d="M9 9h6"/><path d="M10 13v4"/><path d="M14 13v4"/></svg>
            TRAFIC IDF
        </h5>
        <div class="widget-val" style="color: var(--accent-green)">Fluide</div>
        <div class="widget-sub">A1 & A6 OK</div>
    </div>
</div>

<div class="sticky-nav">
    <a href="https://wa.me/33767742220" class="sn-item sn-msg">
        <svg class="icon-tech" viewBox="0 0 24 24"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
        WHATSAPP
    </a>
    <a href="tel:+33767742220" class="sn-item sn-tel">
        <svg class="icon-tech" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0.7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        APPELER
    </a>
</div>

<div class="overlay" id="finalModal">
    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <h2 style="font-family: Marcellus; letter-spacing: 1px;">TARIF GARANTI</h2>
        <div id="price-display" style="font-size: 4rem; color: var(--accent-blue); margin: 25px 0; font-family: Marcellus; text-shadow: 0 0 30px var(--accent-blue);">--€</div>
        <p style="color: var(--text-med); margin-bottom: 30px; font-size: 0.9rem;">Service Premium inclus<br>Zéro commission chauffeur</p>
        <button class="btn-tech" onclick="confirmRide()">RÉSERVER MAINTENANT</button>
        <p style="margin-top: 20px; font-size: 0.7rem; color: var(--text-med); cursor: pointer;" onclick="document.getElementById('finalModal').classList.remove('show')">Modifier les options</p>
    </div>
</div>

<script>
let currentAmb = "Musique";
let currentVol = 65;
let currentClim = 21;

function nextStep(n) {
    document.getElementById('step1').classList.add('locked');
    document.getElementById('step2').classList.remove('locked');
    document.getElementById('step2').classList.add('active');
}

function setAmb(idx, val) {
    currentAmb = val;
    document.getElementById('glow').style.transform = `translateX(${idx * 100}%)`;
    document.querySelectorAll('.media-opt').forEach((el, i) => el.classList.toggle('active', i === idx));
    document.getElementById('amb-label').innerText = val;
}

function updateUI(id, val, unit) {
    if(id === 'vol') currentVol = val;
    if(id === 'clim') currentClim = val;
    document.getElementById(`${id}-val`).innerText = val + unit;
}

async function calculateFinal() {
    document.getElementById('btn-text').style.display = 'none';
    document.getElementById('calc-loader').style.display = 'block';
    
    // Simulation Intelligence Backend (Normalement ici appel API Google Matrix / OSRM)
    setTimeout(() => {
        const fakePrice = Math.floor(Math.random() * 20) + 35;
        document.getElementById('price-display').innerText = fakePrice + "€";
        document.getElementById('calc-loader').style.display = 'none';
        document.getElementById('btn-text').style.display = 'block';
        document.getElementById('finalModal').classList.add('show');
    }, 1200);
}

function confirmRide() {
    const dep = document.getElementById('dep').value |

| "Non précisé";
    const arr = document.getElementById('arr').value |

| "Non précisé";
    const time = document.getElementById('timepick').value |

| "Dès que possible";
    const price = document.getElementById('price-display').innerText;

    const message = `*COMMANDE VTC TECH-EDITION*%0A%0A` +
                    `📍 DÉPART: ${dep}%0A` +
                    `🏁 ARRIVÉE: ${arr}%0A` +
                    `🕒 HEURE: ${time}%0A%0A` +
                    `*CONFIG HABITACLE:*%0A` +
                    `🎵 AMBIANCE: ${currentAmb}%0A` +
                    `🔊 VOLUME: ${currentVol}%%0A` +
                    `❄️ CLIM: ${currentClim}°C%0A%0A` +
                    `*PRIX FIXÉ: ${price}*`;

    window.open(`https://wa.me/33767742220?text=${message}`, '_blank');
}
</script>

</body>
</html>
