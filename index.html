
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I&N RUN | Calculateur Tarif GPS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="calculator">
  <h1 style="text-align:center;margin-bottom:32px;color:var(--gold);">Calculateur I&N RUN</h1>
  <div class="input-group">
    <label>Départ</label>
    <input type="text" id="depart" placeholder="Paris Centre, Louvre..." />
  </div>
  <div class="input-group">
    <label>Arrivée</label>
    <input type="text" id="arrivee" placeholder="CDG Aéroport, Orly..." />
  </div>
  <button class="btn-calc" onclick="calculerTarif()">Calculer tarif exact</button>
  <div id="result" class="result">
    <h3>Tarif calculé</h3>
    <div id="prix" class="price-final"></div>
    <p id="info"></p>
    <div id="map-preview"></div>
    <a id="wa-link" class="btn-calc whatsapp-btn" href="#" target="_blank">Réserver WhatsApp</a>
  </div>
</div>

<script>
const FRAIS = 6.0, PRIX_KM = 1.95, MINIMUM = 12.0;

async function calculerTarif() {
  const dep = document.getElementById('depart').value.trim() || '48.8566,2.3522';
  const arr = document.getElementById('arrivee').value.trim() || '48.975,2.56';

  try {
    // Geocode robuste Paris/CDG
    const [depCoord, arrCoord] = await Promise.all([
      geocodeAddress(dep),
      geocodeAddress(arr)
    ]);

    if (!depCoord || !arrCoord) throw new Error('Adresses non trouvées');

    const distance = await getOSRMDistance(depCoord[1], depCoord[0], arrCoord[1], arrCoord[0]);

    const prix = Math.max(FRAIS + distance * PRIX_KM, MINIMUM);

    document.getElementById('prix').textContent = prix.toFixed(2) + ' €';
    document.getElementById('info').innerHTML = `Distance: <strong>${distance.toFixed(1)} km</strong><br>Frais: <strong>${FRAIS} €</strong> | Km: <strong>${PRIX_KM} €</strong>`;
    document.getElementById('wa-link').href = `https://wa.me/33767742220?text=Bonjour I&N RUN!%0A${dep} → ${arr}%0ADistance: ${distance.toFixed(1)}km%0ATarif: ${prix.toFixed(2)}€`;

    showMap(depCoord, arrCoord);
    document.getElementById('result').classList.add('show');

  } catch(e) {
    alert('Erreur calcul: ' + e.message + '. Essayez "Paris" → "CDG"');
  }
}

async function geocodeAddress(addr) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(addr)}&countrycodes=fr&addressdetails=1`);
    const data = await res.json();
    if (data[0]) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
  } catch(e) {}

  // Fallback Paris/CDG
  if (addr.toLowerCase().includes('cdg') || addr.toLowerCase().includes('aéroport') ) return [48.975, 2.56];
  return [48.8566, 2.3522]; // Paris Centre
}

async function getOSRMDistance(lon1, lat1, lon2, lat2) {
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false&alternatives=false`;
    const res = await fetch(url);
    const data = await res.json();
    return data.routes[0] ? data.routes[0].distance / 1000 : 32; // Fallback CDG
  } catch(e) {
    return 32; // Paris-CDG moyenne
  }
}

function showMap(dep, arr) {
  const mapEl = document.getElementById('map-preview');
  if (mapEl._leaflet_id) L.map(mapEl).remove();

  const map = L.map(mapEl).setView([(dep[0]+arr[0])/2, (dep[1]+arr[1])/2], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap France'
  }).addTo(map);

  L.marker(dep).addTo(map).bindPopup('Départ');
  L.marker(arr).addTo(map).bindPopup('Arrivée');
  map.fitBounds([dep, arr], {padding: [20,20]});
}

// Enter key
document.addEventListener('keypress', e => {
  if (e.key === 'Enter') calculerTarif();
});
</script>
</body>
</html>
