<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTC Premium | Dashboard Tech-Épuré</title>
    <style>
        :root {
            /* Palette Obsidian Tech */
            --bg-primary: #080616;
            --surface-elevated: #1a19531a;
            --accent-blue: #1e90ff;
            --accent-green: #00ff85;
            --text-high: #e0e0e0;
            --text-med: #b0b0b0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-3d: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        body {
            background: var(--bg-primary);
            background: radial-gradient(circle at top right, #1a1953 0%, #080616 100%);
            color: var(--text-high);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Layout Principal */
       .dashboard {
            width: 95vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            perspective: 1000px;
        }

        /* Effet Glassmorphism */
       .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-3d);
        }

        /* Section Carte (Simulation) */
       .map-section {
            position: relative;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1526628953301-3e589a6a8b74?q=80&w=2000') center/cover;
            filter: saturate(0.5) brightness(0.7);
        }

       .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 20px;
        }

        /* Colonne de Contrôles */
       .controls-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 25px;
        }

        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-blue); margin-bottom: 15px; }

        /* Sliders 3D (Clim & Volume) */
       .control-group { margin-bottom: 25px; }
       .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-med); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--text-high);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-blue);
            transition: var(--transition);
        }

        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* Barre de Sélection Multimédia (Segmented Control) */
       .media-selector {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 4px;
            position: relative;
            margin-top: 10px;
        }

       .media-option {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            z-index: 2;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            border-radius: 50px;
        }

        input[type="radio"] { display: none; }

       .media-selector input:checked + label { color: white; font-weight: bold; }

       .selection-glow {
            position: absolute;
            height: calc(100% - 8px);
            width: 32%;
            background: var(--accent-blue);
            border-radius: 50px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.5);
        }

        /* Logic Position Glow */
        #music:checked ~.selection-glow { transform: translateX(0%); }
        #radio:checked ~.selection-glow { transform: translateX(105%); }
        #silence:checked ~.selection-glow { transform: translateX(210%); }

        /* Toggles 3D Intuitifs */
       .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 12px 15px;
            border-radius: 16px;
            margin-top: 10px;
        }

       .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

       .switch input { opacity: 0; width: 0; height: 0; }

       .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition:.4s;
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.1);
        }

       .slider-toggle:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 3px;
            background-color: var(--text-med);
            transition:.4s;
            border-radius: 50%;
        }

        input:checked +.slider-toggle { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        input:checked +.slider-toggle:before { transform: translateX(20px); background-color: white; }

        /* Bouton Finalisation */
       .btn-build {
            margin-top: auto;
            background: linear-gradient(135deg, var(--accent-blue), #0052d4);
            border: none;
            padding: 15px;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

       .btn-build:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(30, 144, 255, 0.4); }
       .btn-build:active { transform: translateY(1px); }

    </style>
</head>
<body>

<main class="dashboard">
    <section class="glass-panel map-section">
        <div class="map-overlay glass-panel">
            <h3 style="color: var(--accent-green)">● En route vers l'aéroport</h3>
            <p style="font-size: 0.8rem; color: var(--text-med)">Arrivée prévue : 14:45</p>
        </div>
    </section>

    <aside class="glass-panel controls-sidebar">
        <h2>Confort Habitacle</h2>

        <div class="control-group">
            <div class="label-row">
                <span>Volume Audio</span>
                <span id="vol-val">65%</span>
            </div>
            <input type="range" min="0" max="100" value="65" oninput="document.getElementById('vol-val').innerText = this.value + '%'">
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>Climatisation</span>
                <span id="temp-val">21°C</span>
            </div>
            <input type="range" min="16" max="28" value="21" oninput="document.getElementById('temp-val').innerText = this.value + '°C'">
        </div>

        <div class="control-group">
            <div class="label-row"><span>Source Multimédia</span></div>
            <div class="media-selector">
                <input type="radio" name="media" id="music" checked>
                <label for="music" class="media-option">Musique</label>
                
                <input type="radio" name="media" id="radio">
                <label for="radio" class="media-option">Radio</label>
                
                <input type="radio" name="media" id="silence">
                <label for="silence" class="media-option">Silence</label>

                <div class="selection-glow"></div>
            </div>
        </div>

        <div class="control-group">
            <div class="toggle-container">
                <span>Mode Nuit</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider-toggle"></span>
                </label>
            </div>
            <div class="toggle-container">
                <span>Wi-Fi Passager</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider-toggle"></span>
                </label>
            </div>
            <div class="toggle-container">
                <span>Siège Chauffant</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider-toggle"></span>
                </label>
            </div>
        </div>

        <button class="btn-build">FINALISER LA RÉSERVATION</button>
    </aside>
</main>

<script>
    // Micro-interactions additionnelles
    document.querySelectorAll('.media-option').forEach(option => {
        option.addEventListener('click', () => {
            // Haptic feedback simulé ou animation sonore possible ici
        });
    });
</script>

</body>
</html>
