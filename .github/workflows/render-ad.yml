name: Render InRun Ad

on:
  push:
    branches: [main]
    paths:
      - 'video/src/**'
      - 'video/public/**'
      - 'video/package.json'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: video/package-lock.json

      - name: Install dependencies
        working-directory: video
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Render InRunAd
        working-directory: video
        run: npx remotion render InRunAd out/inrun-ad.mp4 --gl=swiftshader

      - name: Upload MP4
        uses: actions/upload-artifact@v4
        with:
          name: inrun-ad
          path: video/out/inrun-ad.mp4
          retention-days: 30
