name: Deploy Hub Worker

# Deploys the Cloudflare Worker (inrun-hub) automatically.
# No more pasting code into the Cloudflare dashboard by hand.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# The Worker's runtime secrets (GITHUB_TOKEN, GIST_ID, HUB_SECRET) are
# stored on the Worker itself and are preserved across deploys — this
# workflow only updates the code.

on:
  push:
    branches: [main]
    paths:
      - 'workers/hub-proxy/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/hub-proxy
