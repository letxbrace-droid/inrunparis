<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PRODUCT_NAME}} — Product Diagnostics</title>
<style>
  :root {
    --pass: #16a34a;
    --pass-bg: #f0fdf4;
    --fail: #dc2626;
    --fail-bg: #fef2f2;
    --partial: #ca8a04;
    --partial-bg: #fefce8;
    --unknown: #6b7280;
    --unknown-bg: #f9fafb;
    --bg: #fafaf9;
    --text: #1c1917;
    --muted: #78716c;
    --border: #d6d3d1;
    --surface: #ffffff;
    --accent: #4f46e5;
    --accent-bg: #eef2ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* --- SECTION LAYOUT --- */
  section {
    min-height: 100vh;
    padding: 80px 40px;
    border-bottom: 1px solid var(--border);
    max-width: 1200px;
    margin: 0 auto;
  }

  section.hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 120px 40px;
  }

  /* --- TYPOGRAPHY --- */
  h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 24px; }
  h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 3px solid var(--text); }
  h3 { font-size: 1.35rem; font-weight: 700; margin-bottom: 16px; }
  h4 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  p { margin-bottom: 16px; max-width: 720px; }
  .subtitle { font-size: 1.25rem; color: var(--muted); max-width: 640px; margin-bottom: 48px; }

  /* --- VERDICT BADGES --- */
  .verdict { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: white; }
  .verdict.pass { background: var(--pass); }
  .verdict.fail { background: var(--fail); }
  .verdict.partial { background: var(--partial); }
  .verdict.unknown { background: var(--unknown); }

  /* --- DATA SOURCE CARDS --- */
  .source-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin: 32px 0; }
  .source-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 8px; }
  .source-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .source-card .value { font-size: 1.15rem; font-weight: 700; }
  .source-card.missing { border-style: dashed; opacity: 0.6; }

  /* --- SCORECARD --- */
  .scorecard { width: 100%; border-collapse: collapse; margin: 24px 0; }
  .scorecard th { text-align: left; padding: 12px 16px; background: var(--text); color: white; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .scorecard td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .scorecard tr:nth-child(even) { background: #fafaf9; }
  .scorecard .feature-name { font-weight: 700; }

  /* --- FUNNEL --- */
  .funnel { display: flex; gap: 0; overflow-x: auto; padding: 32px 0; align-items: flex-end; }
  .funnel-step { flex-shrink: 0; text-align: center; width: 140px; }
  .funnel-bar { margin: 0 auto 8px; width: 80px; background: var(--accent); border-radius: 4px 4px 0 0; transition: height 0.3s; min-height: 20px; display: flex; align-items: flex-end; justify-content: center; color: white; font-weight: 700; font-size: 0.85rem; padding-bottom: 8px; }
  .funnel-step .label { font-size: 0.75rem; font-weight: 600; }
  .funnel-step .rate { font-size: 0.7rem; color: var(--muted); }
  .funnel-step .dropoff { font-size: 0.7rem; color: var(--fail); font-weight: 600; }
  .funnel-arrow { flex-shrink: 0; display: flex; align-items: center; padding-bottom: 30px; color: var(--muted); font-size: 1.2rem; }

  /* --- DIAGNOSIS CARD --- */
  .diagnosis { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 32px; margin-bottom: 32px; }
  .diagnosis-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .diagnosis-title { font-size: 1.2rem; font-weight: 700; }
  .layer-row { display: grid; grid-template-columns: 140px 80px 1fr; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
  .layer-row:last-child { border-bottom: none; }
  .layer-label { font-weight: 600; font-size: 0.85rem; }
  .layer-evidence { font-size: 0.9rem; color: var(--muted); }

  /* --- DISAGREEMENT BOX --- */
  .disagreement { background: var(--accent-bg); border: 1px solid #c7d2fe; padding: 24px; border-radius: 8px; margin: 24px 0; }
  .disagreement h4 { color: var(--accent); }

  /* --- IMPACT BOX --- */
  .impact-box { background: var(--fail-bg); border: 1px solid #fecaca; padding: 24px; border-radius: 8px; margin: 16px 0; }
  .impact-box.positive { background: var(--pass-bg); border-color: #bbf7d0; }

  /* --- ACTION CARD --- */
  .action-card { background: var(--pass-bg); border: 1px solid #bbf7d0; padding: 16px 20px; border-radius: 6px; margin-top: 16px; }
  .action-card h4 { color: var(--pass); font-size: 0.8rem; margin-bottom: 8px; }

  /* --- DATA GAP --- */
  .data-gap { background: var(--unknown-bg); border: 1px dashed var(--border); padding: 16px 20px; border-radius: 6px; margin: 12px 0; }
  .data-gap h4 { color: var(--unknown); font-size: 0.8rem; margin-bottom: 8px; }

  /* --- TABLE --- */
  table { width: 100%; border-collapse: collapse; margin: 24px 0; font-size: 0.9rem; }
  th { text-align: left; padding: 12px 16px; background: var(--text); color: white; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:nth-child(even) { background: #fafaf9; }

  /* --- FOOTER --- */
  footer { padding: 48px 40px; text-align: center; color: var(--muted); font-size: 0.85rem; max-width: 1200px; margin: 0 auto; }

  @media (max-width: 768px) {
    section { padding: 48px 20px; }
    h1 { font-size: 2.2rem; }
    .source-grid { grid-template-columns: 1fr; }
    .layer-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!--

  =================================================
  This template defines the section structure and CSS for product diagnostics reports.
  When generating a report, replace {{PLACEHOLDERS}} and populate sections.

  6. Diagnosis by Feature (deep dive per feature)
  7. Disagreement Analysis (where layers contradict)

      <div class="rate">{{absolute_rate}}% of total</div>

    </div>
    <div class="funnel-arrow">→</div>
    ...
  </div>
-->

</body>
</html>
