<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BRAND_NAME}} — Ad Creative Review</title>
<style>
  :root {
    --critical: #dc2626;
    --high: #ea580c;
    --medium: #ca8a04;
    --low: #2563eb;
    --bg: #fafaf9;
    --text: #1c1917;
    --muted: #78716c;
    --border: #d6d3d1;
    --surface: #ffffff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --accent: #7c3aed;
    --accent-bg: #f5f3ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* --- SECTION LAYOUT --- */
  section {
    min-height: 100vh;
    padding: 80px 40px;
    border-bottom: 1px solid var(--border);
    max-width: 1200px;
    margin: 0 auto;
  }

  section.hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 120px 40px;
  }

  /* --- TYPOGRAPHY --- */
  h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 24px; }
  h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 3px solid var(--text); }
  h3 { font-size: 1.35rem; font-weight: 700; margin-bottom: 16px; }
  h4 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  p { margin-bottom: 16px; max-width: 720px; }
  .subtitle { font-size: 1.25rem; color: var(--muted); max-width: 640px; margin-bottom: 48px; }

  /* --- SEVERITY BADGES --- */
  .badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: white; }
  .badge.critical { background: var(--critical); }
  .badge.high { background: var(--high); }
  .badge.medium { background: var(--medium); }
  .badge.low { background: var(--low); }

  /* --- CONTEXT GRID --- */
  .context-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin: 32px 0; }
  .context-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 8px; }
  .context-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .context-card .value { font-size: 1.15rem; font-weight: 700; }

  /* --- VERDICT BOX --- */
  .verdict-box { background: var(--text); color: white; padding: 48px; border-radius: 8px; margin: 48px 0; }
  .verdict-box h3 { color: white; font-size: 1.5rem; margin-bottom: 16px; }
  .verdict-box p { color: #d6d3d1; font-size: 1.1rem; max-width: 100%; }
  .verdict-box .score { font-size: 4rem; font-weight: 900; line-height: 1; margin-bottom: 16px; }
  .verdict-box .score.strong { color: #4ade80; }
  .verdict-box .score.average { color: #fbbf24; }
  .verdict-box .score.weak { color: #f87171; }

  /* --- STATS ROW --- */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 32px 0; }
  .stat-card { text-align: center; padding: 24px; background: var(--surface); border: 2px solid var(--border); border-radius: 8px; }
  .stat-card .number { font-size: 2.5rem; font-weight: 800; line-height: 1; }
  .stat-card .number.critical { color: var(--critical); }
  .stat-card .number.high { color: var(--high); }
  .stat-card .number.medium { color: var(--medium); }
  .stat-card .number.low { color: var(--low); }
  .stat-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-top: 8px; }

  /* --- SCORING DASHBOARD --- */
  .scoring-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 32px 0; }
  .score-item { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .score-item .dimension-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
  .score-item .score-bar { flex: 2; height: 8px; background: #e7e5e4; border-radius: 4px; overflow: hidden; }
  .score-item .score-bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .score-item .score-bar .fill.strong { background: var(--green); }
  .score-item .score-bar .fill.average { background: var(--medium); }
  .score-item .score-bar .fill.weak { background: var(--critical); }
  .score-item .score-value { font-weight: 800; font-size: 1.1rem; width: 40px; text-align: right; }

  /* --- CREATIVE GALLERY --- */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin: 32px 0; }
  .gallery-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .gallery-item img { width: 100%; height: 240px; object-fit: cover; border-bottom: 1px solid var(--border); }
  .gallery-item .gallery-info { padding: 16px; }
  .gallery-item .gallery-info .filename { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; word-break: break-all; }
  .gallery-item .gallery-info .gallery-score { font-size: 1.5rem; font-weight: 800; }
  .gallery-item .gallery-info .gallery-note { font-size: 0.85rem; margin-top: 8px; }
  .gallery-item.best { border-color: var(--green); border-width: 2px; }
  .gallery-item.worst { border-color: var(--critical); border-width: 2px; }

  /* --- MARKET BREAKDOWN --- */
  .market-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 32px; margin-bottom: 24px; }
  .market-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .market-header .market-name { font-size: 1.35rem; font-weight: 700; }
  .market-header .market-score { font-size: 2rem; font-weight: 900; }

  /* --- FINDINGS --- */
  .finding { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 32px; margin-bottom: 32px; border-left: 5px solid transparent; }
  .finding.critical-border { border-left-color: var(--critical); }
  .finding.high-border { border-left-color: var(--high); }
  .finding.medium-border { border-left-color: var(--medium); }
  .finding.low-border { border-left-color: var(--low); }
  .finding-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .finding-title { font-size: 1.2rem; font-weight: 700; }
  .dimension-tag { display: inline-block; padding: 3px 10px; background: var(--accent-bg); border: 1px solid #ddd6fe; border-radius: 4px; font-size: 0.75rem; font-weight: 600; color: var(--accent); }

  .evidence-gallery { display: flex; gap: 12px; overflow-x: auto; padding: 16px 0; }
  .evidence-gallery img { width: 160px; height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex-shrink: 0; }

  .recommendation { background: var(--green-bg); border: 1px solid #bbf7d0; padding: 16px 20px; border-radius: 6px; margin-top: 16px; }
  .recommendation h4 { color: var(--green); font-size: 0.8rem; margin-bottom: 8px; }

  /* --- COMPLIANCE TABLE --- */
  table { width: 100%; border-collapse: collapse; margin: 24px 0; font-size: 0.9rem; }
  th { text-align: left; padding: 12px 16px; background: var(--text); color: white; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:nth-child(even) { background: #fafaf9; }
  .pass { color: var(--green); font-weight: 700; }
  .fail { color: var(--critical); font-weight: 700; }

  /* --- CREATIVE SYSTEM BOX --- */
  .system-assessment { background: var(--accent-bg); border: 1px solid #ddd6fe; padding: 32px; border-radius: 8px; margin: 32px 0; }
  .system-assessment h3 { color: var(--accent); }

  /* --- ACTION CARDS --- */
  .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin: 32px 0; }
  .action-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; border-top: 4px solid transparent; }
  .action-card.quick { border-top-color: var(--green); }
  .action-card.sprint { border-top-color: var(--accent); }
  .action-card.strategic { border-top-color: var(--text); }
  .action-card .action-type { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 8px; }
  .action-card.quick .action-type { color: var(--green); }
  .action-card.sprint .action-type { color: var(--accent); }
  .action-card.strategic .action-type { color: var(--text); }
  .action-card h4 { text-transform: none; letter-spacing: normal; color: var(--text); font-size: 1.1rem; }

  /* --- CREATIVE BRIEF --- */
  .brief-box { background: var(--text); color: white; padding: 48px; border-radius: 8px; margin: 48px 0; }
  .brief-box h3 { color: white; margin-bottom: 24px; }
  .brief-box p { color: #d6d3d1; }
  .brief-box ul { color: #d6d3d1; padding-left: 20px; margin-bottom: 16px; }
  .brief-box li { margin-bottom: 8px; }

  /* --- INVENTORY TABLE --- */
  .inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 32px 0; }
  .inventory-item { text-align: center; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .inventory-item .count { font-size: 2rem; font-weight: 800; }
  .inventory-item .desc { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

  /* --- FOOTER --- */
  footer { padding: 48px 40px; text-align: center; color: var(--muted); font-size: 0.85rem; max-width: 1200px; margin: 0 auto; }

  @media (max-width: 768px) {
    section { padding: 48px 20px; }
    h1 { font-size: 2.2rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .scoring-grid { grid-template-columns: 1fr; }
    .gallery { grid-template-columns: 1fr; }
    .action-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!--
  EAGLE AD REVIEW — HTML REPORT TEMPLATE
  =======================================
  This template defines the section structure and CSS for ad creative review reports.
  When generating a report, replace {{PLACEHOLDERS}} and populate sections.

  REQUIRED SECTIONS:
  1. Hero / Cover (context cards: objective, audience, platforms, KPI, markets, creative count)
  2. Overall Verdict (score out of 100, 1-2 sentence thesis)
  3. Creative Inventory (file counts by market, format, medium)
  4. Scoring Dashboard (10-dimension scores with visual bars)
  5. Best & Worst Performers (gallery with thumbnails and scores)
  6. Per-Market / Per-Campaign Breakdown (score + key findings per group)
  7. Cross-Cutting Findings (ordered by impact, with evidence thumbnails)
  8. Platform Compliance Audit (pass/fail table)
  9. Creative System Assessment (testing framework, variation, fatigue)
  10. Recommended Actions (three levels: quick fix, next sprint, strategic)
  11. Creative Brief for Next Round (what to make next based on findings)
  12. Footer

  CONTEXT CARDS TO INCLUDE:
  - Campaign Objective (Awareness / Installs / Conversions / etc.)
  - Target Audience
  - Platforms & Placements
  - Primary KPI
  - Markets Covered
  - Creatives Reviewed (count)

  SECTION STRUCTURES:

  === VERDICT ===
  <div class="verdict-box">
    <div class="score {{strong|average|weak}}">{{XX}}/100</div>

      <span class="score-value">{{X.X}}</span>
    </div>
    ...repeat for each dimension...
  </div>

  === GALLERY ===
  <div class="gallery">
    <div class="gallery-item best">
      <img src="thumbnails/{{filename}}" alt="{{description}}">
      <div class="gallery-info">
        <div class="filename">{{filename}}</div>
        <div class="gallery-score">{{XX}}/100</div>
        <div class="gallery-note">{{Why this is best/worst}}</div>
      </div>
    </div>
    ...repeat...
  </div>

  === MARKET BREAKDOWN ===
  <div class="market-card">
    <div class="market-header">
      <span class="market-name">{{Market Name}}</span>
      <span class="market-score">{{X.X}}/10</span>
    </div>
    <p>{{Key findings for this market}}</p>
  </div>

  === FINDING ===
  <div class="finding {{severity}}-border">
    <div class="finding-header">
      <span class="badge {{severity}}">{{SEVERITY}}</span>
      <span class="finding-title">F#: {{Title}}</span>
      <span class="dimension-tag">{{Dimension}}</span>
    </div>

      <img src="thumbnails/{{file2}}" alt="{{desc}}">

    <h4>Why It Matters</h4>
    <p>{{KPI impact with research/benchmark support}}</p>
    <div class="recommendation">
      <h4>Recommendation</h4>
      <p>{{Specific, actionable fix}}</p>
    </div>
  </div>

  === ACTION CARDS ===
  <div class="action-grid">
    <div class="action-card quick">
      <div class="action-type">Quick Fix — This Week</div>
      <h4>{{Action title}}</h4>
      <p>{{What to do and expected impact}}</p>
    </div>
    <div class="action-card sprint">
      <div class="action-type">Next Sprint</div>

  === CREATIVE BRIEF ===
  <div class="brief-box">
    <h3>Creative Brief for Next Round</h3>
    <p>Based on this review, here's what the next batch of creatives should focus on:</p>
    <ul>
      <li>{{Priority 1}}</li>
      <li>{{Priority 2}}</li>
      <li>{{Priority 3}}</li>
    </ul>
  </div>
