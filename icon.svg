<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#14253D"/>
      <stop offset="100%" stop-color="#050D18"/>
    </radialGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="transparent" filter="url(#grain)" opacity="0.04"/>
  <text x="256" y="320" text-anchor="middle"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-style="italic" font-weight="700" font-size="300"
    fill="#D4AF37" letter-spacing="-8">IN</text>
  <rect x="216" y="418" width="80" height="2" rx="1" fill="#D4AF37" opacity="0.6"/>
</svg>
