  />

  <!-- Road perspective lines inside the leg -->
  <line x1="220" y1="336" x2="352" y2="434" stroke="#ff4103" stroke-width="12" stroke-linecap="round"/>
  <line x1="248" y1="320" x2="388" y2="434" stroke="#ff4103" stroke-width="7"  stroke-linecap="round" opacity="0.55"/>
